services:
  - type: web
    name: store-instructions-cms
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/store-instructions.db
    disk:
      name: cms-data
      mountPath: /data
      sizeGB: 1
