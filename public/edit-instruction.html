<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Instruction - Store Instructions CMS</title>
  <link rel="stylesheet" href="/admin-styles.css">
</head>
<body>
  <div class="header">
    <h1>Edit Instruction</h1>
    <button class="btn btn-secondary" onclick="window.location.href='/'">Back to Dashboard</button>
  </div>
  
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div>
          <h2 class="card-title" id="instruction-title-display">Loading...</h2>
          <p id="instruction-store-display"></p>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="addBlock()">Add Block</button>
          <button class="btn btn-secondary" onclick="previewInstruction()">Preview</button>
          <button class="btn" onclick="togglePublish()" id="publish-btn">Publish</button>
        </div>
      </div>
      
      <div id="blocks-container"></div>
    </div>
  </div>
  
  <script src="/edit-instruction.js"></script>
</body>
</html>
