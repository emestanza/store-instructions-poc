<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Instruction - Store Instructions CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/admin-styles.css">
</head>
<body>
  <div class="header">
    <h1>Edit Instruction</h1>
    <button class="btn btn-secondary" onclick="window.location.href='/'">Back to Dashboard</button>
  </div>
  
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div>
          <h2 class="card-title" id="instruction-title-display">Loading...</h2>
          <p id="instruction-store-display"></p>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="openBlockTypeModal()">Add Block</button>
          <button class="btn btn-secondary" onclick="previewInstruction()">Preview</button>
          <button class="btn" onclick="togglePublish()" id="publish-btn">Publish</button>
        </div>
      </div>
      
      <div id="blocks-container"></div>
    </div>
  </div>
  
  <!-- Block Type Selector Modal -->
  <div id="block-type-modal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <h3 class="modal-title">Choose Block Type</h3>
        <button class="close-btn" onclick="closeBlockTypeModal()">&times;</button>
      </div>
      
      <div class="block-type-grid">
        <div class="block-type-card" onclick="selectBlockType('text')">
          <div class="block-type-icon">📝</div>
          <h4 class="block-type-title">Text</h4>
          <p class="block-type-description">Add text content with rich formatting</p>
        </div>
        
        <div class="block-type-card" onclick="selectBlockType('image')">
          <div class="block-type-icon">🖼️</div>
          <h4 class="block-type-title">Image</h4>
          <p class="block-type-description">Upload and display images with captions</p>
        </div>
        
        <div class="block-type-card" onclick="selectBlockType('video')">
          <div class="block-type-icon">🎥</div>
          <h4 class="block-type-title">Video</h4>
          <p class="block-type-description">Add video content with thumbnails</p>
        </div>
      </div>
    </div>
  </div>
  
  <script src="/edit-instruction.js"></script>
</body>
</html>
