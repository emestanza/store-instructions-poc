<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Preview - Store Instructions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tokens.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lexend', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--zu-color-neutral-100);
      color: var(--zu-color-neutral-700);
      padding: var(--zu-space-4);
      max-width: 600px;
      margin: 0 auto;
      font-weight: var(--zu-font-weight-light);
    }

    .preview-header {
      background: linear-gradient(135deg, var(--zu-color-brand-primary) 0%, var(--zu-color-brand-accent) 100%);
      color: var(--zu-color-neutral-100);
      padding: var(--zu-space-4);
      border-radius: 8px;
      margin-bottom: var(--zu-space-4);
      text-align: center;
    }

    .preview-header h1 {
      font-size: var(--zu-font-size-20);
      font-weight: var(--zu-font-weight-semibold);
      margin-bottom: var(--zu-space-2);
    }

    .preview-header p {
      font-size: var(--zu-font-size-14);
      font-weight: var(--zu-font-weight-light);
      opacity: 0.9;
    }

    .instruction-title {
      font-size: var(--zu-font-size-24);
      font-weight: var(--zu-font-weight-bold);
      margin-bottom: var(--zu-space-4);
      color: var(--zu-color-neutral-700);
    }

    .block {
      margin-bottom: var(--zu-space-6);
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .text-block {
      background: var(--zu-color-neutral-200);
      padding: var(--zu-space-4);
      border-radius: 8px;
      border-left: 4px solid var(--zu-color-brand-primary);
      line-height: 1.6;
      font-size: var(--zu-font-size-16);
      font-weight: var(--zu-font-weight-light);
    }

    .image-block {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .image-block img {
      width: 100%;
      height: auto;
      display: block;
    }

    .image-caption {
      padding: var(--zu-space-3);
      background: var(--zu-color-neutral-200);
      font-size: var(--zu-font-size-14);
      font-weight: var(--zu-font-weight-light);
      color: var(--zu-color-neutral-600);
      text-align: center;
    }

    .video-block {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      background: #000;
    }

    .video-block video {
      width: 100%;
      height: auto;
      display: block;
    }

    .video-block .video-placeholder {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: white;
      font-size: 3rem;
    }

    .loading {
      text-align: center;
      padding: var(--zu-space-10);
      color: var(--zu-color-neutral-500);
      font-weight: var(--zu-font-weight-light);
    }

    .error {
      background: var(--zu-color-negative-300);
      color: var(--zu-color-negative-700);
      padding: var(--zu-space-4);
      border-radius: 8px;
      text-align: center;
      font-weight: var(--zu-font-weight-semibold);
    }

    .continue-btn {
      position: sticky;
      bottom: var(--zu-space-4);
      width: 100%;
      padding: var(--zu-space-4);
      background: linear-gradient(135deg, var(--zu-color-brand-primary) 0%, var(--zu-color-brand-accent) 100%);
      color: var(--zu-color-neutral-100);
      border: none;
      border-radius: 8px;
      font-size: var(--zu-font-size-16);
      font-weight: var(--zu-font-weight-semibold);
      font-family: 'Lexend', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 67, 252, 0.4);
      margin-top: var(--zu-space-8);
    }

    .continue-btn:active {
      transform: scale(0.98);
    }

    .block-number {
      display: inline-block;
      width: 24px;
      height: 24px;
      background: var(--zu-color-brand-primary);
      color: var(--zu-color-neutral-100);
      border-radius: 50%;
      text-align: center;
      line-height: 24px;
      font-size: var(--zu-font-size-12);
      font-weight: var(--zu-font-weight-semibold);
      margin-right: var(--zu-space-2);
    }
  </style>
</head>
<body>
  <div class="preview-header">
    <h1>Mobile Preview</h1>
    <p id="preview-subtitle">Loading...</p>
  </div>
  
  <div id="content"></div>
  
  <script>
    async function loadPreview() {
      const urlParams = new URLSearchParams(window.location.search)
      const instructionId = urlParams.get('id')
      
      if (!instructionId) {
        document.getElementById('content').innerHTML = '<div class="error">No instruction ID provided</div>'
        return
      }
      
      try {
        const response = await fetch(`/api/instructions/${instructionId}`)
        const data = await response.json()
        
        if (!data.success) {
          document.getElementById('content').innerHTML = '<div class="error">Instruction not found</div>'
          return
        }
        
        const instruction = data.data
        document.getElementById('preview-subtitle').textContent = 
          `${instruction.store_name} (${instruction.store_external_id})`
        
        let html = `<h2 class="instruction-title">${instruction.title}</h2>`
        
        instruction.blocks.forEach((block, index) => {
          html += `<div class="block">`
          
          switch (block.block_type) {
            case 'text':
              html += `
                <div class="text-block">
                  <span class="block-number">${index + 1}</span>
                  ${block.text_content || ''}
                </div>
              `
              break
              
            case 'image':
              html += `
                <div class="image-block">
                  ${block.image_url ? `<img src="${block.image_url}" alt="${block.image_alt || ''}" />` : '<div style="padding: 2rem; text-align: center; background: #f0f0f0;">No image uploaded</div>'}
                  ${block.image_caption ? `<div class="image-caption">${block.image_caption}</div>` : ''}
                </div>
              `
              break
              
            case 'video':
              html += `
                <div class="video-block">
                  ${block.video_url ? `
                    <video controls ${block.video_thumbnail_url ? `poster="${block.video_thumbnail_url}"` : ''}>
                      <source src="${block.video_url}" type="video/mp4">
                      Your browser does not support the video tag.
                    </video>
                  ` : '<div class="video-placeholder">▶</div>'}
                </div>
              `
              break
          }
          
          html += `</div>`
        })
        
        html += '<button class="continue-btn" onclick="window.close()">Continuar</button>'
        
        document.getElementById('content').innerHTML = html
      } catch (error) {
        console.error('Error loading preview:', error)
        document.getElementById('content').innerHTML = '<div class="error">Error loading preview</div>'
      }
    }
    
    document.addEventListener('DOMContentLoaded', loadPreview)
  </script>
</body>
</html>
